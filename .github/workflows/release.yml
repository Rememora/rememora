name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Check unified project version
        run: python3 scripts/version.py --check --tag "${GITHUB_REF_NAME}"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install OpenSSL dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rememora-${{ matrix.target }}.tar.gz rememora
          cd ../../..
          shasum -a 256 rememora-${{ matrix.target }}.tar.gz > rememora-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rememora-${{ matrix.target }}
          path: |
            rememora-${{ matrix.target }}.tar.gz
            rememora-${{ matrix.target }}.tar.gz.sha256

  universal-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rememora-aarch64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: rememora-x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p aarch64 x86_64
          tar xzf rememora-aarch64-apple-darwin.tar.gz -C aarch64
          tar xzf rememora-x86_64-apple-darwin.tar.gz -C x86_64
          lipo -create aarch64/rememora x86_64/rememora -output rememora
          tar czf rememora-universal-apple-darwin.tar.gz rememora
          shasum -a 256 rememora-universal-apple-darwin.tar.gz > rememora-universal-apple-darwin.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: rememora-universal-apple-darwin
          path: |
            rememora-universal-apple-darwin.tar.gz
            rememora-universal-apple-darwin.tar.gz.sha256

  release:
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Any tag containing `-` (e.g. v1.3.0-rc.1, v1.3.0-beta.2) is
          # flagged as a pre-release so `brew install rememora` — which
          # reads the tap's stable formula — isn't affected.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            rememora-*.tar.gz
            rememora-*.sha256

  update-tap:
    needs: release
    # Skip the Homebrew tap update for pre-release tags — the tap has one
    # formula and would overwrite the stable version if we let RCs through.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rememora-universal-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: rememora-x86_64-unknown-linux-gnu

      - name: Get checksums
        id: sha
        run: |
          echo "mac_sha=$(cat rememora-universal-apple-darwin.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_sha=$(cat rememora-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: Rememora/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "mac_sha": "${{ steps.sha.outputs.mac_sha }}",
              "linux_sha": "${{ steps.sha.outputs.linux_sha }}"
            }
